<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #030712; color: #f3f4f6; height: 100vh; display: flex; }
    .sidebar { width: 256px; background: #111827; border-right: 1px solid #1f2937; padding: 16px; }
    .brand { color: #34d399; font-weight: 700; font-size: 18px; }
    .sub { color: #6b7280; font-size: 12px; margin: 4px 0 16px; }
    .nav-item { padding: 8px 12px; border-radius: 8px; color: #9ca3af; font-size: 14px; margin-bottom: 4px; }
    .nav-item.active { background: rgba(5, 150, 105, 0.2); color: #34d399; }
    .main { flex: 1; padding: 32px; }
    h1 { font-size: 24px; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 900px; }
    .card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 20px; }
    .card h3 { font-size: 16px; margin-bottom: 8px; }
    .card p { color: #9ca3af; font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
    .meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: #1f2937; color: #9ca3af; }
    .tag.active { background: rgba(5, 150, 105, 0.2); color: #34d399; }
    .tag.warn { background: rgba(217, 119, 6, 0.2); color: #fbbf24; }
    .bar { height: 6px; background: #1f2937; border-radius: 999px; margin-top: 12px; overflow: hidden; }
    .bar > span { display: block; height: 100%; background: #10b981; border-radius: 999px; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">Personal AI Runtime</div>
    <div class="sub">你的第二大脑</div>
    <div class="nav-item">💬 对话</div>
    <div class="nav-item active">🎯 目标</div>
    <div class="nav-item">🧩 记忆</div>
    <div class="nav-item">📊 仪表盘</div>
  </aside>
  <main class="main">
    <h1>目标管理</h1>
    <div class="grid">
      <div class="card">
        <h3>【Demo】完成用户验证访谈</h3>
        <p>邀请 5 位朋友试用两周，记录 D7 留存与导出使用率。</p>
        <div class="meta">
          <span class="tag active">进行中</span>
          <span class="tag">重要 0.9</span>
          <span class="tag warn">停滞 4 天</span>
        </div>
        <div class="bar"><span style="width: 35%"></span></div>
      </div>
      <div class="card">
        <h3>【Demo】整理 README 截图与上手文档</h3>
        <p>让新用户 5 分钟内看懂「本地优先 + 可导出」的差异。</p>
        <div class="meta">
          <span class="tag active">进行中</span>
          <span class="tag">重要 0.6</span>
        </div>
        <div class="bar"><span style="width: 60%"></span></div>
      </div>
    </div>
  </main>
</body>
</html>
