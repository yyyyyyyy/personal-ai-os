<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat + Approval</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #030712; color: #f3f4f6; height: 100vh; display: flex; }
    .sidebar { width: 256px; background: #111827; border-right: 1px solid #1f2937; padding: 16px; display: flex; flex-direction: column; }
    .brand { color: #34d399; font-weight: 700; font-size: 18px; }
    .sub { color: #6b7280; font-size: 12px; margin-top: 4px; margin-bottom: 16px; }
    .nav { display: flex; flex-direction: column; gap: 4px; }
    .nav-item { padding: 8px 12px; border-radius: 8px; color: #9ca3af; font-size: 14px; }
    .nav-item.active { background: rgba(5, 150, 105, 0.2); color: #34d399; }
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat { flex: 1; padding: 24px; overflow: hidden; }
    .msg { max-width: 720px; margin-bottom: 16px; }
    .msg.user { margin-left: auto; text-align: right; }
    .bubble { display: inline-block; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.5; text-align: left; }
    .user .bubble { background: #065f46; color: #ecfdf5; }
    .assistant .bubble { background: #1f2937; color: #e5e7eb; }
    .approval { max-width: 720px; background: rgba(120, 53, 15, 0.3); border: 1px solid rgba(217, 119, 6, 0.5); border-radius: 12px; padding: 16px; margin-top: 8px; }
    .approval h4 { color: #fcd34d; font-size: 14px; margin-bottom: 8px; }
    .approval pre { background: #030712; padding: 8px; border-radius: 8px; font-size: 12px; color: #d1d5db; margin-bottom: 12px; overflow: hidden; }
    .btns { display: flex; gap: 8px; }
    .btn-ok { background: #059669; color: white; border: none; padding: 6px 16px; border-radius: 8px; font-size: 13px; }
    .btn-no { background: #374151; color: #e5e7eb; border: none; padding: 6px 16px; border-radius: 8px; font-size: 13px; }
    .input-bar { border-top: 1px solid #1f2937; padding: 16px 24px; display: flex; gap: 12px; }
    .input { flex: 1; background: #111827; border: 1px solid #374151; border-radius: 12px; padding: 12px 16px; color: #6b7280; font-size: 14px; }
    .send { background: #059669; color: white; border: none; padding: 0 20px; border-radius: 12px; font-size: 14px; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">Personal AI Runtime</div>
    <div class="sub">你的第二大脑</div>
    <nav class="nav">
      <div class="nav-item active">💬 对话</div>
      <div class="nav-item">🎯 目标</div>
      <div class="nav-item">📧 收件箱</div>
      <div class="nav-item">🧩 记忆</div>
      <div class="nav-item">📊 仪表盘</div>
    </nav>
  </aside>
  <main class="main">
    <div class="chat">
      <div class="msg user">
        <div class="bubble">在桌面创建一个 weekly-notes.txt，写上本周三件要事。</div>
      </div>
      <div class="msg assistant">
        <div class="bubble">我可以帮你写入文件。该操作会修改本地磁盘，需要你确认后才会执行。</div>
        <div class="approval">
          <h4>⚠️ 确认操作: write_file</h4>
          <pre>{
  "path": "~/Desktop/weekly-notes.txt",
  "content": "1. 用户验证访谈\n2. README 截图\n3. 导出备份自测"
}</pre>
          <div class="btns">
            <button class="btn-ok">确认执行</button>
            <button class="btn-no">拒绝</button>
          </div>
        </div>
      </div>
    </div>
    <div class="input-bar">
      <div class="input">输入消息…（高风险工具需你确认）</div>
      <button class="send">发送</button>
    </div>
  </main>
</body>
</html>
